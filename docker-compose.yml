services:
  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    volumes:
      - app-data:/app/.data

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - app

volumes:
  app-data:
